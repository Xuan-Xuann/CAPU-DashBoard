<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>404 · CAPU</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #e8eeff 0%, #f0e6ff 50%, #ffe8f0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1e293b;
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* 毛玻璃卡片 */
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 48px;
      padding: 56px 48px;
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.6),
        0 20px 40px rgba(79, 70, 229, 0.12);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      text-align: center;
      max-width: 500px;
      width: 100%;
      animation: float 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes float {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 40%, #ec4899 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
      text-shadow: 0 4px 20px rgba(79, 70, 229, 0.15);
    }

    .error-icon {
      font-size: 56px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #1e293b 0%, #4a4a6a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .message {
      color: #64748b;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(79, 70, 229, 0.35);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #4a4a6a;
      border: 0.5px solid rgba(255, 255, 255, 0.8);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.8);
      transform: translateY(-3px);
    }

    .suggestion {
      margin-top: 32px;
      color: #94a3b8;
      font-size: 14px;
    }

    .suggestion a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
      margin: 0 4px;
    }

    .suggestion a:hover {
      text-decoration: underline;
    }

    /* Footer - 与 Vue 组件保持一致 */
    .app-footer {
      padding: 0 32px 18px;
      margin-top: auto;
    }

    .footer-inner {
      max-width: 100%;
      padding: 14px 28px;
      border-radius: 60px;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 
        inset 0 1px 1px rgba(255, 255, 255, 0.5),
        0 8px 32px rgba(0, 0, 0, 0.04);
      border: 0.5px solid rgba(255, 255, 255, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #3a3a5a;
      font-size: 13px;
      font-weight: 450;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .copyright {
      color: #4a4a6a;
    }

    .separator {
      opacity: 0.3;
      font-weight: 300;
    }

    .brand {
      display: flex;
      gap: 1px;
    }

    .brand-letter {
      display: inline-block;
      font-weight: 600;
    }

    .school {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 500;
    }

    .footer-time-row {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .time {
      font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      color: #64748b;
    }

    .footer-links-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .footer-link {
      color: #4a4a6a;
      text-decoration: none;
      font-weight: 500;
      font-size: 13px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .link-separator {
      color: #cbd5e1;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .glass-card {
        padding: 40px 28px;
        border-radius: 36px;
      }

      .error-code {
        font-size: 90px;
      }

      .error-icon {
        font-size: 44px;
      }

      h1 {
        font-size: 24px;
      }

      .message {
        font-size: 15px;
      }

      .btn {
        padding: 12px 22px;
        font-size: 14px;
      }

      .app-footer {
        padding: 0 12px 12px;
      }

      .footer-inner {
        padding: 16px 20px;
        border-radius: 30px;
      }
    }

    /* 安全区域适配 */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .app-footer {
        padding-bottom: calc(18px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="glass-card">
      <div class="error-icon">🔍</div>
      <div class="error-code">404</div>
      <h1>页面未找到</h1>
      <p class="message">
        你访问的页面可能已经移动、<br>
        被删除，或者从未存在过。
      </p>
      <div class="actions">
        <a href="/" class="btn btn-primary">
          <span>🏠</span>
          <span>返回首页</span>
        </a>
        <button onclick="history.back()" class="btn btn-secondary">
          <span>←</span>
          <span>返回上一页</span>
        </button>
      </div>
      <div class="suggestion">
        或者试试访问
        <a href="/">数据看板</a>·
        <a href="/announcements">校园公告</a>·
        <a href="/guide">新生引导</a>
      </div>
    </div>
  </div>

  <!-- Footer - 与 Vue AppFooter.vue 保持一致 -->
  <footer class="app-footer">
    <div class="footer-inner">
      <!-- 第一行：版权 + 品牌 -->
      <div class="footer-row">
        <span class="copyright">©Rinty Developer <span id="current-year"></span></span>
        <span class="separator">/</span>
        <span class="brand">
          <span class="brand-letter">C</span>
          <span class="brand-letter">A</span>
          <span class="brand-letter">P</span>
          <span class="brand-letter">U</span>
        </span>
        <span class="separator">/</span>
        <span class="school">成都航空职业技术大学</span>
      </div>
      
      <!-- 第二行：时间 -->
      <div class="footer-row footer-time-row">
        <span class="time" id="current-time"></span>
      </div>
      
      <!-- 第三行：链接 -->
      <div class="footer-row footer-links-row">
        <a href="#" class="footer-link">关于</a>
        <span class="link-separator">·</span>
        <a href="#" class="footer-link">隐私</a>
        <span class="link-separator">·</span>
        <a href="#" class="footer-link">条款</a>
      </div>
    </div>
  </footer>

  <script>
    // 动态更新时间
    function updateTime() {
      const now = new Date()
      document.getElementById('current-year').textContent = now.getFullYear()
      document.getElementById('current-time').textContent = now.toLocaleString('zh-CN')
    }
    updateTime()
    setInterval(updateTime, 1000)
  </script>
</body>
</html>
